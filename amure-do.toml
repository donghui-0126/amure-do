[project]
name = "job scheduling optimization"
domain = "custom"
description = "기존 조합최적화 문제인 job-shop scheduling을 LLM기반으로 최적화 하기 위한 프레임워크"

[server]
host = "0.0.0.0"
port = 9090

[backend]
type = "none"
timeout_secs = 300

[llm]
default_provider = "claude_cli"
max_tokens = 4096

[gates]
enabled = [
    "claim_gate",
    "argument_gate",
    "evidence_gate",
    "experiment_gate",
]

[dashboard]
title = "amure-do"
accent_color = "#7c3aed"
